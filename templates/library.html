<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的书库</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: #d2d2d7;
            --line-soft: #e5e5ea;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--bg);
        }

        a {
            color: inherit;
        }

        .page {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding: 40px 0 64px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
        }

        .section-title {
            margin: 0;
            font-size: 34px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .top-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            min-height: 42px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 8px;
            padding: 0 18px;
            color: #ffffff;
            background: var(--accent);
            font-size: 15px;
            font-weight: 600;
            line-height: 1;
            text-decoration: none;
            transition: background 160ms ease, transform 160ms ease;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            min-width: 0;
        }

        .book-card {
            display: flex;
            position: relative;
            flex-direction: column;
            min-width: 0;
            min-height: 184px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 24px 26px;
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .book-card:hover {
            border-color: var(--line);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .book-title {
            display: -webkit-box;
            margin: 0;
            overflow: hidden;
            color: var(--text);
            font-size: 22px;
            font-weight: 700;
            line-height: 1.38;
            letter-spacing: 0;
            overflow-wrap: anywhere;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
        }

        .book-meta {
            display: grid;
            gap: 8px;
            max-width: 100%;
            margin-top: auto;
            padding-top: 28px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .book-meta span {
            display: block;
            overflow-wrap: anywhere;
        }

        .book-action {
            display: inline-flex;
            width: fit-content;
            min-height: 34px;
            align-items: center;
            justify-content: center;
            margin-top: 18px;
            margin-left: auto;
            border-radius: 999px;
            padding: 0 12px;
            color: var(--accent);
            background: var(--accent-soft);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 160ms ease, transform 160ms ease;
        }

        .book-action:hover {
            background: #dcecff;
            transform: translateX(2px);
        }

        .empty-state {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 210px;
            align-items: center;
            gap: 26px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 28px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .empty-state h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
        }

        .empty-state p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .empty-code {
            display: grid;
            gap: 9px;
            border-left: 3px solid var(--accent);
            padding-left: 18px;
            color: var(--muted);
            font-family: "SFMono-Regular", Consolas, "Microsoft YaHei UI", monospace;
            font-size: 13px;
        }

        @media (max-width: 860px) {
            .page {
                width: 100%;
                max-width: 680px;
                padding: 28px 16px 48px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-actions {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .empty-state {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 520px) {
            .section-title {
                font-size: 30px;
            }

            .book-grid {
                grid-template-columns: minmax(0, calc(100vw - 32px));
                width: calc(100vw - 32px);
                max-width: calc(100vw - 32px);
            }

            .book-card {
                width: calc(100vw - 32px);
                max-width: calc(100vw - 32px);
            }

            .empty-state {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <h1 class="section-title" id="library-title">我的书库</h1>
            <nav class="top-actions" aria-label="首页操作">
                <a class="btn" href="/import">＋ 导入书籍</a>
            </nav>
        </header>

        <section id="library" aria-labelledby="library-title">
            {% if not books %}
            <div class="empty-state">
                <div>
                    <h2>书库还没有内容</h2>
                    <p>可以从网页上传 EPUB，也可以在命令行处理本地文件后刷新本页。</p>
                </div>
                <div class="empty-code" aria-label="命令示例">
                    <span>uv run server.py</span>
                    <span>uv run reader3.py book.epub</span>
                </div>
            </div>
            {% else %}
            <div class="book-grid">
                {% for book in books %}
                <article class="book-card">
                    <h3 class="book-title">{{ book.title }}</h3>
                    <div class="book-meta">
                        <span>{{ book.author or "未知作者" }}</span>
                    </div>
                    <a class="book-action" href="/read/{{ book.id }}/0" aria-label="阅读《{{ book.title }}》">阅读 →</a>
                </article>
                {% endfor %}
            </div>
            {% endif %}
        </section>
    </main>
</body>
</html>
