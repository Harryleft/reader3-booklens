<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入书籍</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: #d2d2d7;
            --line-soft: #e5e5ea;
            --accent: #0071e3;
            --accent-soft: #eaf3ff;
            --danger: #d70015;
            --success: #248a3d;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: var(--bg);
        }

        .container {
            width: min(720px, calc(100% - 40px));
            margin: 0 auto;
            padding: 40px 0 64px;
        }

        .nav {
            margin-bottom: 26px;
        }

        .nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        h1 {
            margin: 0 0 24px;
            color: var(--text);
            font-size: 34px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: 0;
        }

        #drop-zone {
            border: 1px dashed var(--line);
            border-radius: 8px;
            padding: 60px 24px;
            text-align: center;
            background: var(--surface);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        #drop-zone:hover,
        #drop-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-1px);
        }

        #drop-zone .icon {
            display: inline-grid;
            width: 58px;
            height: 58px;
            place-items: center;
            margin-bottom: 18px;
            border-radius: 8px;
            color: var(--accent);
            background: var(--accent-soft);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0;
        }

        #drop-zone .hint {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        #drop-zone .hint em {
            color: var(--accent);
            font-style: normal;
            font-weight: 600;
            cursor: pointer;
        }

        #file-input {
            display: none;
        }

        #results {
            margin-top: 24px;
        }

        .result-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            padding: 16px 18px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .result-icon {
            display: inline-grid;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            place-items: center;
            border-radius: 50%;
            color: var(--text);
            background: #f2f2f2;
            font-size: 12px;
            font-weight: 700;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            overflow: hidden;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-meta {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .result-error {
            margin-top: 4px;
            color: var(--danger);
            font-size: 13px;
        }

        .result-link {
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }

        .result-link:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid var(--line-soft);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 520px) {
            .container {
                width: 100%;
                padding: 28px 16px 48px;
            }

            h1 {
                font-size: 30px;
            }

            #drop-zone {
                padding: 44px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="/">&#8592; 返回书库</a></div>
        <h1>导入书籍</h1>

        <div id="drop-zone">
            <div class="icon">EPUB</div>
            <div class="hint">将 EPUB 文件拖放到此处，或 <em id="browse-btn">点击选择文件</em></div>
        </div>
        <input type="file" id="file-input" accept=".epub" multiple>

        <div id="results"></div>
    </div>

    <script>
    (function() {
        var dropZone = document.getElementById('drop-zone');
        var fileInput = document.getElementById('file-input');
        var results = document.getElementById('results');

        document.getElementById('browse-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            fileInput.click();
        });
        dropZone.addEventListener('click', function() { fileInput.click(); });

        // Drag events
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(fileInput.files);
            fileInput.value = '';
        });

        function handleFiles(files) {
            for (var i = 0; i < files.length; i++) {
                uploadFile(files[i]);
            }
        }

        function uploadFile(file) {
            var card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = '<div class="spinner"></div>'
                + '<div class="result-info">'
                + '<div class="result-title">' + escapeHtml(file.name) + '</div>'
                + '<div class="result-meta">处理中...</div>'
                + '</div>';
            results.appendChild(card);

            var formData = new FormData();
            formData.append('file', file);

            fetch('/api/upload', { method: 'POST', body: formData })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        card.innerHTML = '<div class="result-icon">好</div>'
                            + '<div class="result-info">'
                            + '<div class="result-title">' + escapeHtml(data.title) + '</div>'
                            + '<div class="result-meta">' + escapeHtml(data.author) + ' &middot; ' + data.chapters + ' 章节</div>'
                            + '</div>'
                            + '<a href="/" class="result-link">查看书库</a>';
                    } else {
                        card.innerHTML = '<div class="result-icon">错</div>'
                            + '<div class="result-info">'
                            + '<div class="result-title">' + escapeHtml(file.name) + '</div>'
                            + '<div class="result-error">' + escapeHtml(data.error || '处理失败') + '</div>'
                            + '</div>';
                    }
                })
                .catch(function(err) {
                    card.innerHTML = '<div class="result-icon">错</div>'
                        + '<div class="result-info">'
                        + '<div class="result-title">' + escapeHtml(file.name) + '</div>'
                        + '<div class="result-error">网络错误</div>'
                        + '</div>';
                });
        }

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    })();
    </script>
</body>
</html>
